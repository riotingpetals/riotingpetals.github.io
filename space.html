<h1>SPACE DATA</h1>
<h3>A Collection of realtime NASA and .gov data</h3>
<p>&nbsp;</p>
<h4>IMAGE OF THE DAY</h4>
<button id="fetchImage">Fetch Image</button>
<div class="imageContainer"></div>

<script>
  document.getElementById('fetchImage').addEventListener('click', fetchImage);

  function fetchImage() {
    fetch('https://api.nasa.gov/planetary/apod?api_key=8gvaOa1QlKawh1pOwb3nduvAV2qTDBgwlgXaZkr')
      .then(response => response.json())
      .then(data => {
        const imageUrl = data[0].url; // Get the image URL from the response
        const imgElement = document.createElement('img'); // Create an img element
        imgElement.src = imageUrl; // Set the src attribute
        document.querySelector('.imageContainer').innerHTML = ''; // Clear previous images
        document.querySelector('.imageContainer').appendChild(imgElement); // Add the new image
      })
      .catch(error => console.error('Error fetching image:', error)); // Handle errors
  }
</script>
